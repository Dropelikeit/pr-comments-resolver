name: Sync Version To Manifests

on:
  push:
    tags:
      - "v*"

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > "$tmp" && mv "$tmp" .claude-plugin/plugin.json
          jq --arg v "$VERSION" '(.plugins[] | select(.name == "pr-comments-resolver") | .version) |= $v' .claude-plugin/marketplace.json > "$tmp" && mv "$tmp" .claude-plugin/marketplace.json

      - name: Commit version bump
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "Manifests already at version ${VERSION}; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync manifest version to ${TAG} [skip ci]"
          git push origin main
