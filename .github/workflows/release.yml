name: Release

on:
  push:
    branches: [main]

jobs:
  tag:
    name: SemVer Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

  sync-version:
    name: Sync Version To Manifests
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update manifests
        env:
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: |
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > "$tmp" && mv "$tmp" .claude-plugin/plugin.json
          jq --arg v "$VERSION" '(.plugins[] | select(.name == "pr-comments-resolver") | .version) |= $v' .claude-plugin/marketplace.json > "$tmp" && mv "$tmp" .claude-plugin/marketplace.json

      - name: Commit version bump
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "Manifests already at version ${VERSION}; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync manifest version to ${TAG} [skip ci]"
          git push origin main
