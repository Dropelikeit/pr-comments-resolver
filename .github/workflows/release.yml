name: Release

on:
  push:
    branches: [main]

jobs:
  tag:
    name: SemVer Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

  sync-version:
    name: Sync Version To Manifests
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Update manifests
        env:
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"

          bump_root() {
            local file="$1"
            [ -f "$file" ] || { echo "skip (missing): $file"; return; }
            jq --arg v "$VERSION" '.version = $v' "$file" > "$tmp" && mv "$tmp" "$file"
            echo "updated root version: $file"
          }

          bump_plugins_entry() {
            local file="$1"
            [ -f "$file" ] || { echo "skip (missing): $file"; return; }
            jq --arg v "$VERSION" \
              'if (.plugins // empty) then (.plugins[] | select(.name == "pr-comments-resolver") | .version) |= $v else . end' \
              "$file" > "$tmp" && mv "$tmp" "$file"
            echo "updated plugins[] version: $file"
          }

          # Claude
          bump_root         .claude-plugin/plugin.json
          bump_plugins_entry .claude-plugin/marketplace.json

          # Augment (root version on both files + plugins[] entry)
          bump_root         .augment-plugin/plugin.json
          bump_root         .augment-plugin/marketplace.json
          bump_plugins_entry .augment-plugin/marketplace.json

          # Codex
          bump_root         .codex-plugin/plugin.json

      - name: Commit version bump
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/ .augment-plugin/ .codex-plugin/
          if git diff --cached --quiet; then
            echo "Manifests already at version ${VERSION}; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync manifest version to ${TAG} [skip ci]"
          git push origin main
